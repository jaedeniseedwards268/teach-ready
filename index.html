<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Teaching Toolkit - Recreated</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-600">CS Teaching Toolkit</h1>
            <p class="text-gray-600">AI-Powered Lesson Planner</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Inputs -->
            <aside class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Topic</label>
                    <input type="text" id="topic" class="mt-1 block w-full border rounded-md p-2" placeholder="e.g. Loops in Python">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Grade Level</label>
                    <select id="grade" class="mt-1 block w-full border rounded-md p-2">
                        <option>K-5</option>
                        <option>6-8</option>
                        <option>9-12</option>
                    </select>
                </div>
                <button onclick="generateLesson()" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">Generate Plan</button>
            </aside>

            <!-- Output -->
            <main class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border">
                <div id="output" class="prose max-w-none">
                    <p class="text-gray-400 italic">Your generated lesson plan will appear here...</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        function generateLesson() {
            const topic = document.getElementById('topic').value;
            const grade = document.getElementById('grade').value;
            
            const output = document.getElementById('output');
            output.innerHTML = `
                <h2 class="text-xl font-bold">${topic} (${grade})</h2>
                <hr class="my-4">
                <h3 class="font-bold">Objectives</h3>
                <ul><li>Understand core concepts of ${topic}.</li></ul>
                <h3 class="font-bold mt-4">Activity</h3>
                <p>A 45-minute hands-on exercise focused on practical implementation...</p>
            `;
        }
    </script>
</body>
</html>
