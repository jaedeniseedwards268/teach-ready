<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Teach Ready Planner</title> <style> body { font-family: system-ui, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; color: #333; } .page { max-width: 900px; margin: 0 auto; padding: 2rem; } .card { background: white; border-radius: 8px; padding: 1.5rem; margin-top: 1.5rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); } .card-header h1 { margin: 0; } .small-muted { color: #666; font-size: 0.9rem; } label { font-weight: 600; display: block; margin-top: 1rem; } select, input[type="text"], textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; } .ai-chat-log { background: #fff; border: 1px solid #ddd; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; max-height: 300px; overflow-y: auto; } .ai-chat-input { display: flex; gap: 0.5rem; margin-bottom: 1rem; } .ai-chat-input textarea { flex: 1; resize: vertical; } .ai-msg-user { background: #e6f0ff; padding: 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; } .ai-msg-assistant { background: #f1f1f1; padding: 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; } .button-row { display: flex; gap: 0.5rem; margin-top: 1rem; } button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background-color: #007bff; color: white; cursor: pointer; } button:hover { background-color: #0056b3; } </style> </head> <body> <main class="page"> <section id="chatAssistant"> <h2>💭 Chat with the AI Lesson Coach</h2> <div id="aiChatLog" class="ai-chat-log" aria-live="polite"> <div class="ai-msg-assistant">Assistant: Ask for adaptations, simplifications, or extensions.</div> </div> <div class="ai-chat-input"> <textarea id="aiChatInput" placeholder="Ask for an unplugged version, UDL supports, extensions, etc."></textarea> <button id="aiChatSendBtn">Send</button> </div> </section>

<section class="card" aria-label="Lesson plan form">
  <div class="card-header">
    <h1>CS Teaching Toolkit – Lesson Plan</h1>
    <small class="small-muted">UDL, accessibility, and CS standards built in.</small>
  </div>

  <section>
    <label for="exampleLoader">Load Example Lesson</label>
    <select id="exampleLoader" aria-label="Load example lesson">
      <option value="">Choose an example…</option>
      <optgroup label="K–2 Examples">
        <option value="ex1">Sorting with Socks</option>
        <option value="ex2">Story Sequencing with Arrows</option>
        <option value="ex3">Robot Commands with Stuffed Animals</option>
      </optgroup>
      <optgroup label="3–5 Examples">
        <option value="ex4">Emoji Sorting Algorithms</option>
        <option value="ex5">Paper Programming with Loops</option>
        <option value="ex6">Debugging a Treasure Map</option>
      </optgroup>
      <optgroup label="6–8 Examples">
        <option value="ex7">Intro to Variables with Scratch</option>
        <option value="ex8">Data Collection with Surveys</option>
        <option value="ex9">Conditional Logic with Card Games</option>
      </optgroup>
      <optgroup label="9–12 Examples">
        <option value="ex10">Data Visualizations with Spreadsheets</option>
        <option value="ex11">Building Chatbots with Python</option>
        <option value="ex12">Ethics in AI: Case Study Analysis</option>
      </optgroup>
    </select>
  </section>

  <section>
    <label for="activityType">Primary Activity Type</label>
    <select id="activityType">
      <option value="">Choose an activity type…</option>
      <option>Hands-on Project</option>
      <option>Unplugged Simulation</option>
      <option>Collaborative Problem Solving</option>
      <option>Creative Design Challenge</option>
      <option>Data Collection & Analysis</option>
      <option>Role Play or Scenario</option>
      <option>Digital Tool Exploration</option>
      <option>Mini-Lecture with Guided Practice</option>
    </select>
  </section>

  <!-- The rest of your form fields and AI buttons go here -->

  <div class="button-row">
    <button id="aiObjectiveBtn">Generate Objective</button>
    <button id="aiTaskBtn">Generate Task</button>
    <button id="aiAssessmentBtn">Generate Assessment</button>
    <button id="aiUDLBtn">Generate UDL Supports</button>
    <button id="aiFullLessonBtn">Generate Full Lesson</button>
    <button id="clearBtn">Reset All</button>
  </div>

  <div id="aiOutput"></div>
  <div id="applyRow" style="display:none">
    <button id="applyObjective">Insert Objective</button>
    <button id="applyTask">Insert Task</button>
    <button id="applyAssessment">Insert Assessment</button>
    <button id="applyUDL">Insert UDL</button>
    <button id="applyFull">Insert Full Lesson</button>
  </div>
</section>

</main> </body> </html>
