<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeachReady Toolkit Lesson Planner</title>

  <!-- docx.js for .docx export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.3.2/docx.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.6rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.outline {
      border: 1px solid #444;
      background: white;
    }

    button.secondary {
      background: #ddd;
    }

    #snapshot {
      white-space: pre-wrap;
      background: #fafafa;
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid #ddd;
      min-height: 200px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER WITH LOGO -->
    <div class="card-header">
      <img src="TeachReadyLogo.png" alt="TeachReady Toolkit Logo" style="height:100px;">
      <h1>CSTA TeachReady Toolkit</h1>
      <h2>Lesson Planner</h2>
    </div>

    <!-- BUTTONS -->
    <div class="button-row">
      <button id="aiObjectiveBtn">Generate Objective</button>
      <button id="aiTaskBtn">Generate Task</button>
      <button id="aiAssessmentBtn">Generate Assessment</button>
      <button id="aiUDLBtn">Generate UDL Supports</button>
      <button id="aiFullLessonBtn">Generate Full Lesson</button>
      <button id="clearBtn" class="secondary">Reset All</button>

      <!-- EXPORT BUTTONS -->
      <button id="exportTxtBtn" class="outline">Export as .txt</button>
      <button id="exportDocxBtn" class="outline">Export as .docx</button>
      <button id="exportPdfBtn" class="outline">Export as PDF</button>
    </div>

    <!-- SNAPSHOT OUTPUT -->
    <div id="snapshot">Your lesson plan will appear here...</div>

  </div>

<script>
/* ---------------------- EXPORT AS .TXT ---------------------- */
document.getElementById("exportTxtBtn").addEventListener("click", () => {
  const snapshot = document.getElementById("snapshot").textContent;
  const blob = new Blob([snapshot], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "lesson-plan.txt";
  a.click();

  URL.revokeObjectURL(url);
});


/* ---------------------- EXPORT AS PDF ---------------------- */
document.getElementById("exportPdfBtn").addEventListener("click", () => {
  const printable = document.createElement("div");
  printable.style.padding = "2rem";
  printable.style.fontFamily = "serif";

  printable.innerHTML = `
    <div style="text-align:center;">
      <img src="TeachReadyLogo.png" style="height:120px;">
      <h1>CSTA TeachReady Toolkit</h1>
    </div>
    <h2>Lesson Plan</h2>
    <pre>${document.getElementById("snapshot").textContent}</pre>
  `;

  const win = window.open("", "_blank");
  win.document.write(printable.outerHTML);
  win.document.close();
  win.focus();
  win.print();
});


/* ---------------------- EXPORT AS .DOCX ---------------------- */
document.getElementById("exportDocxBtn").addEventListener("click", async () => {
  const snapshot = document.getElementById("snapshot").textContent;

  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, WidthType, Footer, PageNumber, HeadingLevel, ImageRun
  } = window.docx;

  /* Load the logo file directly */
  const logoBlob = await fetch("TeachReadyLogo.png").then(r => r.blob());
  const logoArrayBuffer = await logoBlob.arrayBuffer();

  /* Header with logo + title */
  const header = new Paragraph({
    children: [
      new ImageRun({
        data: logoArrayBuffer,
        transformation: { width: 140, height: 140 }
      }),
      new TextRun({
        text: "CSTA TeachReady Toolkit",
        bold: true,
        size: 32,
        break: 1
      })
    ],
    alignment: AlignmentType.CENTER,
    spacing: { after: 300 }
  });

  /* Convert snapshot into table rows */
  const lines = snapshot.split("\n");
  const rows = [];
  let currentLabel = "";
  let currentValue = "";

  lines.forEach(line => {
    if (line.endsWith(":")) {
      if (currentLabel) {
        rows.push(
          new TableRow({
            children: [
              new TableCell({
                children: [new Paragraph({ text: currentLabel, bold: true })],
                width: { size: 30, type: WidthType.PERCENTAGE }
              }),
              new TableCell({
                children: [new Paragraph(currentValue.trim())],
                width: { size: 70, type: WidthType.PERCENTAGE }
              })
            ]
          })
        );
      }
      currentLabel = line.replace(":", "");
      currentValue = "";
    } else {
      currentValue += line + "\n";
    }
  });

  if (currentLabel) {
    rows.push(
      new TableRow({
        children: [
          new TableCell({
            children: [new Paragraph({ text: currentLabel, bold: true })],
            width: { size: 30, type: WidthType.PERCENTAGE }
          }),
          new TableCell({
            children: [new Paragraph(currentValue.trim())],
            width: { size: 70, type: WidthType.PERCENTAGE }
          })
        ]
      })
    );
  }

  const table = new Table({
    rows,
    width: { size: 100, type: WidthType.PERCENTAGE }
  });

  /* Footer with page numbers */
  const footer = new Footer({
    children: [
      new Paragraph({
        children: [
          new TextRun("Page "),
          PageNumber.CURRENT,
          new TextRun(" of "),
          PageNumber.TOTAL_PAGES
        ],
        alignment: AlignmentType.CENTER
      })
    ]
  });

  const doc = new Document({
    sections: [
      {
        headers: { default: header },
        footers: { default: footer },
        children: [
          new Paragraph({
            text: "Lesson Plan",
            heading: HeadingLevel.HEADING_1,
            spacing: { after: 300 }
          }),
          table
        ]
      }
    ]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "lesson-plan.docx";
  a.click();

  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
